speak_text:
  name: Speak text
  description: Speak a text message on a selected media player.
  fields:
    target_entity:
      name: Target media player
      required: true
      selector:
        entity:
          domain: media_player
    message:
      name: Message
      required: true
      selector:
        text:
          multiline: true
    tts_entity:
      name: TTS entity
      required: false
      selector:
        entity:
          domain: tts
    emergency:
      name: Emergency
      description: Bypass quiet hours for this announcement.
      required: false
      selector:
        boolean:

play_recording:
  name: Play recording
  description: Save a temporary base64 audio recording, play it on a media player, and delete it shortly after.
  fields:
    target_entity:
      name: Target media player
      required: true
      selector:
        entity:
          domain: media_player
    data:
      name: Base64 audio data
      required: true
      selector:
        text:
          multiline: true
    content_type:
      name: Content type
      required: true
      example: audio/webm
      selector:
        text:
    filename:
      name: Filename
      required: false
      example: intercom.webm
      selector:
        text:
    emergency:
      name: Emergency
      description: Bypass quiet hours for this announcement.
      required: false
      selector:
        boolean:

delete_temp_files:
  name: Delete temporary files
  description: Delete any temporary Family Intercom recordings immediately.

show_reply_view:
  name: Show reply view
  description: Cast the configured Lovelace reply view to one or more media players.
  fields:
    target_entity:
      name: Target media player
      required: true
      selector:
        entity:
          domain: media_player
    dashboard_path:
      name: Dashboard path
      description: Dashboard URL path, for example lovelace or 56-hunt-rd.
      required: false
      selector:
        text:
    view_path:
      name: View path
      description: Lovelace view path, for example family-intercom-reply.
      required: false
      selector:
        text:
    message:
      name: Message context
      required: false
      selector:
        text:
